[tasks.build]
description = "Build all projects"
workspace = false
command = "cargo"
args = ["build", "--all-features", "${@}"]
dependencies = []


[tasks.format]
description = "Format code using rustfmt"
workspace = false
command = "cargo"
args = ["fmt", "--all"]

[tasks.format-check]
description = "Verify code formatting with rustfmt"
workspace = false
command = "cargo"
args = ["fmt", "--check", "--all"]

[tasks.docs-build]
description = "Build the HonKit documentation site"
workspace = false
command = "bash"
args = ["-lc", "cd docs/gitbook && npm ci && npm run build"]

[tasks.clean]
description = "Remove build artifacts"
command = "cargo"
args = ["clean", "${@}"]

[tasks.bacon]
description = "Live code checking with bacon"
workspace = false
install_crate = "bacon"
command = "bacon"
args = ["${@}", "check-all"]

[tasks.audit]
description = "Security audit for dependencies"
workspace = false
install_crate = "cargo-audit"
command = "cargo"
args = ["audit", "${@}"]

[tasks.build-prod]
description = "Build optimized release binaries"
workspace = false
command = "cargo"
args = ["build", "--release", "${@}"]
dependencies = []


[tasks.check]
description = "Quick compilation check without building"
workspace = false
command = "cargo"
args = ["check", "--workspace", "--all", "${@}"]

[tasks.test]
description = "Run tests using cargo-nextest (default feature set)"
workspace = false
install_crate = "cargo-nextest@0.9.123"
install_crate_args = ["--locked"]
command = "cargo"
args = ["nextest", "run", "--workspace", "--no-tests=pass", "${@}"]

[tasks.test-all-features]
description = "Run tests using cargo-nextest across all features"
workspace = false
install_crate = "cargo-nextest@0.9.123"
install_crate_args = ["--locked"]
command = "cargo"
args = [
    "nextest",
    "run",
    "--workspace",
    "--all-features",
    "--no-tests=pass",
    "${@}",
]

[tasks.gossip-check]
description = "Check the maintained library/bin surface of the vendored sof-solana-gossip crate"
workspace = false
command = "cargo"
args = [
    "check",
    "--manifest-path",
    "crates/sof-solana-gossip/Cargo.toml",
    "--locked",
    "${@}",
]

[tasks.ci]
description = "Run core contributor checks (format, docs, architecture boundaries, strict clippy, vendored gossip check, default/all-feature tests)"
workspace = false
dependencies = [
    "format-check",
    "docs-build",
    "arch-check",
    "clippy",
    "clippy-no-default-features",
    "gossip-check",
    "test",
    "test-all-features",
]

[tasks.ci-full]
description = "Run core contributor checks plus dependency policy checks"
workspace = false
dependencies = ["ci", "deny"]

[tasks.clippy]
description = "Run clippy with strict rules on all targets and all features"
workspace = false
command = "cargo"
args = [
    "clippy",
    "--workspace",
    "--all-targets",
    "--all-features",
    "--no-deps",
    "--locked",
    "${@}",
    "--",
    "-D",
    "warnings",
]

[tasks.clippy-no-default-features]
description = "Run clippy with strict rules on all targets without optional features"
workspace = false
command = "cargo"
args = [
    "clippy",
    "--workspace",
    "--all-targets",
    "--no-default-features",
    "--no-deps",
    "--locked",
    "${@}",
    "--",
    "-D",
    "warnings",
]

[tasks.arch-check]
description = "Enforce ARD slice dependency boundaries"
workspace = false
command = "bash"
args = ["scripts/arch-check.sh"]


[tasks.udeps]
description = "Find unused dependencies (requires nightly)"
workspace = false
install_crate = "cargo-udeps"
command = "cargo"
args = ["+nightly", "udeps"]

[tasks.bloat]
description = "Analyze binary size and bloat"
workspace = false
install_crate = "cargo-bloat"
command = "cargo"
args = ["bloat", "--release", "${@}"]

[tasks.expand]
description = "Expand macros to see generated code"
workspace = false
install_crate = "cargo-expand"
command = "cargo"
args = ["expand", "${@}"]

[tasks.deny]
description = "Check licenses and security advisories"
workspace = false
install_crate = "cargo-deny"
command = "cargo"
args = ["deny", "check"]

[tasks.tarpaulin]
description = "Generate code coverage report"
workspace = false
install_crate = "cargo-tarpaulin"
command = "cargo"
args = ["tarpaulin", "--exclude-files", "task/*", "${@}"]

[tasks.sqlx]
description = "Run SQLx CLI commands (migrations, etc.)"
install_crate = "sqlx-cli"
command = "sqlx"
args = ["${@}"]

[tasks.fuzz]
description = "Run fuzzing tests on specified targets"
workspace = false
install_crate = "cargo-fuzz"
command = "cargo"
args = ["+nightly", "fuzz", "${@}"]
cwd = "crates/sof-observer"

[tasks.fuzz-smoke]
description = "Run bounded fuzz smoke suite across all SOF fuzz targets"
workspace = false
install_crate = "cargo-fuzz"
command = "bash"
args = [
    "-lc",
    "set -euo pipefail; cd crates/sof-observer; target_name=\"$(printenv SOF_FUZZ_TARGET || true)\"; target_args=(); if [[ -n \"${target_name}\" ]]; then target_args=(--target \"${target_name}\"); fi; for target in parse_wire verify_packet dataset_reassembly slot_reassembly shred_fec_recover plugin_dispatch_events runtime_setup_builder verify_leader_diff derived_state_replay_host; do echo \"== fuzz smoke: ${target} ==\"; cargo +nightly fuzz run \"${target_args[@]}\" \"${target}\" -- -runs=32; done",
]

[tasks.fuzz-smoke-gossip-tuning]
description = "Run bounded fuzz smoke suite for sof-gossip-tuning"
workspace = false
install_crate = "cargo-fuzz"
command = "bash"
args = [
    "-lc",
    "set -euo pipefail; cd crates/sof-gossip-tuning; target_name=\"$(printenv SOF_GOSSIP_TUNING_FUZZ_TARGET || true)\"; target_args=(); if [[ -n \"${target_name}\" ]]; then target_args=(--target \"${target_name}\"); fi; for target in profile_runtime_port; do echo \"== fuzz smoke: ${target} ==\"; cargo +nightly fuzz run \"${target_args[@]}\" \"${target}\" -- -runs=32; done",
]

[tasks.vps-observer-restart-loop]
description = "Run repeated observer_runtime restart/shutdown validation against the configured public host"
workspace = false
command = "cargo"
args = ["run", "-p", "sof", "--bin", "public_host_soak", "--", "observer-restart-loop"]

[tasks.vps-derived-state-restart-check]
description = "Run derived-state replay/restart validation against the configured public host"
workspace = false
command = "cargo"
args = ["run", "-p", "sof", "--bin", "public_host_soak", "--", "derived-state-restart-check"]

[tasks.vps-derived-state-crash-recovery-check]
description = "Run derived-state crash/replay recovery validation against the configured public host"
workspace = false
command = "cargo"
args = ["run", "-p", "sof", "--bin", "public_host_soak", "--", "derived-state-crash-recovery-check"]

[tasks.vps-busy-poll-compare]
description = "Compare baseline vs Linux UDP busy-poll behavior on the VPS observer_runtime profile"
workspace = false
command = "cargo"
args = ["run", "-p", "sof", "--bin", "public_host_soak", "--", "busy-poll-compare"]
