name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust CI toolchain and tools
        uses: ./.github/actions/rust-ci-setup

      - name: Run contributor CI matrix
        run: cargo make ci

      - name: Build and verify publishable crate archives
        run: bash scripts/verify-publishable-archives.sh

  typescript-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install SDK dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript SDK checks
        run: pnpm --dir sdks/typescript run check

  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Setup Rust CI toolchain and tools
        uses: ./.github/actions/rust-ci-setup
        with:
          install-rust-toolchain: "false"
          cargo-tools: cargo-make,cargo-nextest,cargo-fuzz

      - name: Run bounded fuzz smoke suite
        env:
          SOF_FUZZ_TARGET: x86_64-unknown-linux-gnu
        run: cargo make fuzz-smoke
